<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asset Forge — Roblox Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #10101a; --bg3: #16162a; --border: #2a2a4a; --border2: #3a3a6a;
    --accent: #00e5ff; --accent2: #7c3aed; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --text: #e2e8f0; --muted: #64748b; --card: #12121f;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 60%);
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }

  .screen-api { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .logo-icon { width: 72px; height: 72px; border-radius: 16px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.2rem; box-shadow: 0 0 40px rgba(0,229,255,0.2); }
  .logo-title { font-size: 2.4rem; font-weight: 700; letter-spacing: 2px; text-align:center; }
  .logo-sub { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.75rem; margin-top: 0.3rem; letter-spacing: 1px; text-align:center; }
  .api-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 500px; margin-top: 2.5rem; box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); }
  .api-card h2 { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 0.4rem; }
  .api-card > p { color: var(--muted); font-size: 0.93rem; margin-bottom: 1.8rem; line-height: 1.65; }

  .field-label { display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; }
  .api-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.82rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .api-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
  .api-input.err { border-color: var(--red); }
  .api-input.ok  { border-color: var(--green); }

  .s-inline { min-height: 1.4rem; margin-top: 0.5rem; font-family: 'Space Mono', monospace; font-size: 0.8rem; }
  .s-info { color: var(--muted); } .s-ok { color: var(--green); } .s-err { color: var(--red); }

  .toggle-row { display: flex; align-items: center; gap: 0.75rem; margin: 1.2rem 0 1.8rem; cursor: pointer; user-select: none; }
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .tog-track { position: absolute; inset: 0; border-radius: 12px; background: var(--bg3); border: 1px solid var(--border); transition: background 0.2s; }
  .toggle input:checked ~ .tog-track { background: var(--accent2); border-color: var(--accent2); }
  .tog-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .toggle input:checked ~ .tog-track .tog-thumb { transform: translateX(20px); }
  .tog-label { font-size: 0.9rem; color: var(--muted); }
  .tog-label b { color: var(--text); font-weight: 600; }
  .api-help { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; font-family: 'Space Mono', monospace; }
  .api-help a { color: var(--accent); text-decoration: none; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.4rem; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; border: none; cursor: pointer; transition: all 0.18s; text-transform: uppercase; }
  .btn-primary { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; width: 100%; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-sm { font-size: 0.9rem; padding: 0.6rem 1.1rem; }

  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Dashboard */
  .topbar { background: rgba(16,16,26,0.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 0.8rem; }
  .tb-logo { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .tb-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 1.5px; }
  .topbar-right { display: flex; align-items: center; gap: 0.65rem; }
  .key-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 0.38rem 0.75rem; font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); display: flex; align-items: center; gap: 0.45rem; }
  .key-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .so-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 0.85rem; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .so-btn:hover { border-color: var(--red); color: var(--red); }
  .create-btn { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; border: none; padding: 0.5rem 1.1rem; border-radius: 7px; font-family: 'Rajdhani', sans-serif; font-size: 0.92rem; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: filter 0.15s; }
  .create-btn:hover { filter: brightness(1.12); }

  .main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.5rem; }
  .sec-title { font-size: 1rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .legend { display: flex; gap: 1.2rem; }
  .leg-item { display: flex; align-items: center; gap: 0.45rem; font-size: 0.8rem; color: var(--muted); }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  .groupbox { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; min-height: 200px; }
  .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 1px; background: var(--border); }
  .a-card { background: var(--bg2); padding: 1.1rem; display: flex; flex-direction: column; gap: 0.75rem; transition: background 0.15s; cursor: default; }
  .a-card:hover { background: var(--bg3); }
  .a-preview { width: 100%; aspect-ratio: 1; border-radius: 8px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .a-preview img { width: 100%; height: 100%; object-fit: contain; }
  .a-badge { position: absolute; top: 6px; right: 6px; width: 10px; height: 10px; border-radius: 50%; }
  .bg { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .by { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .a-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .a-id { font-family: 'Space Mono', monospace; font-size: 0.63rem; color: var(--muted); }
  .a-tag { display: inline-block; padding: 0.13rem 0.45rem; border-radius: 4px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); width: fit-content; }
  .empty-st { padding: 4rem 2rem; text-align: center; color: var(--muted); }
  .empty-icon { font-size: 2.8rem; margin-bottom: 1rem; opacity: 0.25; }

  /* Modal */
  .m-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1.5rem; animation: fi 0.15s ease; }
  @keyframes fi { from { opacity: 0; } }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 540px; box-shadow: 0 0 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); animation: su 0.2s ease; }
  @keyframes su { from { transform: translateY(20px); opacity: 0; } }
  .m-head { padding: 1.4rem 1.7rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .m-head h3 { font-size: 1.15rem; font-weight: 700; letter-spacing: 1px; }
  .m-body { padding: 1.4rem 1.7rem; display: flex; flex-direction: column; gap: 1.1rem; }
  .m-foot { padding: 0.9rem 1.7rem 1.4rem; display: flex; gap: 0.7rem; justify-content: flex-end; }
  .field { display: flex; flex-direction: column; gap: 0.45rem; }
  .tab-row { display: flex; gap: 0.45rem; flex-wrap: wrap; }
  .tab-btn { padding: 0.4rem 0.9rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 0.83rem; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .tab-btn.on { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .tab-btn:not(.on):hover { border-color: var(--border2); color: var(--text); }
  .paste-ta { width: 100%; min-height: 95px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1rem; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.77rem; outline: none; resize: vertical; line-height: 1.55; transition: border-color 0.2s; }
  .paste-ta:focus { border-color: var(--accent); }
  .up-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 1.4rem; text-align: center; cursor: pointer; color: var(--muted); font-size: 0.88rem; transition: all 0.15s; }
  .up-zone:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.03); }
  .up-icon { font-size: 1.7rem; margin-bottom: 0.35rem; }
  .up-name { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--green); margin-top: 0.35rem; word-break: break-all; }
  .m-status { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.9rem; font-family: 'Space Mono', monospace; font-size: 0.74rem; line-height: 1.6; }
  .ms-err { border-color: var(--red); color: var(--red); }
  .ms-ok { border-color: var(--green); color: var(--green); }
  .ms-info { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 600px) {
    .topbar { padding: 0.8rem 1rem; }
    .main { padding: 1.2rem 0.9rem; }
    .key-badge { display: none; }
    .asset-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body><div id="root"></div>
<script>
const SK = 'rbx_apikey_v3', AK = 'rbx_assets_v3';
const PROXY = '/api/roblox';

const getSaved = () => { try { return localStorage.getItem(SK)||''; } catch { return ''; } };
const setSaved = k => { try { localStorage.setItem(SK,k); } catch {} };
const clearSaved = () => { try { localStorage.removeItem(SK); } catch {} };
const getLocal = () => { try { return JSON.parse(localStorage.getItem(AK)||'[]'); } catch { return []; } };
const saveLocal = a => { try { localStorage.setItem(AK,JSON.stringify(a)); } catch {} };

let apiKey = '', localAssets = getLocal(), remoteAssets = [];

// proxy call (server-side, bypasses CORS)
async function rbx(path, method='GET', body=null, extraHeaders={}) {
  return fetch(PROXY, {
    method: 'POST',
    headers: { 'x-api-key': apiKey, 'x-roblox-path': path, 'x-roblox-method': method, ...extraHeaders },
    body
  });
}

// Validate: anything that isn't 401/403 means the key authenticated
async function validateKey(key) {
  try {
    const r = await fetch(PROXY, {
      method: 'POST',
      headers: { 'x-api-key': key, 'x-roblox-path': '/assets/v1/assets?assetType=Decal&limit=1', 'x-roblox-method': 'GET' }
    });
    return { ok: r.status !== 401 && r.status !== 403, status: r.status };
  } catch(e) { return { ok: false, status: 0, err: e.message }; }
}

// ── Screen 1 ──────────────────────────────────────────────────────────────
function screen1() {
  const saved = getSaved();
  document.getElementById('root').innerHTML = `
<div class="screen-api">
  <div>
    <div class="logo-icon">🎮</div>
    <div class="logo-title">ASSET FORGE</div>
    <div class="logo-sub">ROBLOX CREATOR TOOLKIT</div>
  </div>
  <div class="api-card">
    <h2>Connect your API Key</h2>
    <p>Enter your Roblox Open Cloud API key. In Creator Hub → Open Cloud → API Keys, create a key with <strong>Assets: read + write</strong> for your universe.</p>
    <label class="field-label" for="ki">API KEY</label>
    <input class="api-input" type="password" id="ki" placeholder="paste key here…" autocomplete="off" value="${saved||''}" />
    <div class="s-inline s-info" id="ks"> </div>
    <label class="toggle-row">
      <span class="toggle">
        <input type="checkbox" id="st" ${saved?'checked':''}>
        <span class="tog-track"><span class="tog-thumb"></span></span>
      </span>
      <span class="tog-label"><b>Remember</b> this key on next visit</span>
    </label>
    <button class="btn btn-primary" id="cb" onclick="doConnect()">
      <span class="spinner" id="cs" style="display:none"></span>
      Connect &amp; Validate
    </button>
    <p class="api-help">Need a key? <a href="https://create.roblox.com/dashboard/credentials" target="_blank">Creator Hub → Open Cloud → API Keys ↗</a></p>
  </div>
</div>`;
}

function setKS(cls, msg) {
  const e = document.getElementById('ks'); if (!e) return;
  e.className = 's-inline ' + cls; e.textContent = msg;
}

async function doConnect() {
  const key = (document.getElementById('ki')?.value||'').trim();
  if (!key) { setKS('s-err','⚠ Paste a key first.'); kicls('err'); return; }
  document.getElementById('cb').disabled = true;
  document.getElementById('cs').style.display = 'inline-block';
  setKS('s-info','⏳ Contacting Roblox via proxy…');

  const r = await validateKey(key);

  document.getElementById('cb').disabled = false;
  document.getElementById('cs').style.display = 'none';

  if (r.ok) {
    kicls('ok'); setKS('s-ok','✓ Key accepted — loading dashboard…');
    if (document.getElementById('st')?.checked) setSaved(key); else clearSaved();
    apiKey = key;
    setTimeout(screen2, 600);
  } else {
    kicls('err');
    setKS('s-err', r.status === 0
      ? '✗ Proxy unreachable — deploy to Vercel first.'
      : `✗ Rejected (HTTP ${r.status}) — check Assets read+write scope.`);
  }
}
function kicls(s) { const e = document.getElementById('ki'); if(e) e.className = 'api-input '+(s==='err'?'err':s==='ok'?'ok':''); }

// ── Screen 2 ──────────────────────────────────────────────────────────────
async function screen2() {
  document.getElementById('root').innerHTML = `
<div>
  <div class="topbar">
    <div class="topbar-left">
      <div class="tb-logo">🎮</div>
      <div class="tb-title">ASSET FORGE</div>
    </div>
    <div class="topbar-right">
      <div class="key-badge"><span class="key-dot"></span>${maskKey(apiKey)}</div>
      <button class="create-btn" onclick="openModal()">＋ New Asset</button>
      <button class="so-btn" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div class="sec-header">
      <div class="sec-title">Your Assets</div>
      <div class="legend">
        <span class="leg-item"><span class="leg-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>Created here</span>
        <span class="leg-item"><span class="leg-dot" style="background:var(--yellow);box-shadow:0 0 6px var(--yellow)"></span>External</span>
      </div>
    </div>
    <div class="groupbox" id="gb">
      <div style="padding:2rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.82rem;display:flex;align-items:center;gap:0.75rem;">
        <span class="spinner" style="border-top-color:var(--accent)"></span> Loading assets…
      </div>
    </div>
  </div>
</div>`;
  await loadAssets();
  renderGrid();
}

function maskKey(k) { return k?k.slice(0,6)+'…'+k.slice(-4):'—'; }
function signOut() { apiKey=''; screen1(); }

async function loadAssets() {
  remoteAssets = [];
  try {
    const r = await rbx('/assets/v1/assets?assetType=Decal&limit=50');
    if (r.ok) {
      const d = await r.json();
      const list = d.assets || d.data || [];
      const lids = new Set(localAssets.map(a=>String(a.id)));
      remoteAssets = list.map(a=>({
        id: String(a.assetId||a.id||''),
        name: a.displayName||a.name||'Unnamed',
        assetType: a.assetType||'Decal',
        previewUrl: a.thumbnailUrl||null,
        createdByUs: lids.has(String(a.assetId||a.id||''))
      }));
    }
  } catch {}
}

function renderGrid() {
  const gb = document.getElementById('gb'); if (!gb) return;
  const combined = [
    ...localAssets.map(a=>({...a, createdByUs:true})),
    ...remoteAssets.filter(ra=>!localAssets.find(la=>String(la.id)===ra.id))
  ];
  if (!combined.length) {
    gb.innerHTML = `<div class="empty-st"><div class="empty-icon">📦</div><p>No assets yet — hit <strong>＋ New Asset</strong> to create your first.</p></div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'asset-grid';
  for (const a of combined) grid.appendChild(mkCard(a));
  gb.innerHTML = ''; gb.appendChild(grid);
}

function mkCard(a) {
  const d = document.createElement('div'); d.className = 'a-card';
  const src = a.previewDataUrl || a.previewUrl;
  d.innerHTML = `
    <div class="a-preview">
      ${src ? `<img src="${src}" alt="${a.name}" />` : '<span style="font-size:2rem;opacity:0.2">🖼</span>'}
      <span class="a-badge ${a.createdByUs?'bg':'by'}"></span>
    </div>
    <div class="a-name" title="${a.name}">${a.name}</div>
    <div class="a-id">${a.id?'ID: '+a.id:'Pending…'}</div>
    <div class="a-tag">${a.assetType||'Decal'}</div>`;
  return d;
}

// ── Modal ─────────────────────────────────────────────────────────────────
let ms = {};
function openModal() {
  ms = { name:'', fmt:'png', mode:'paste', svgT:'', pngT:'', file:null, status:'', stype:'', busy:false };
  drawModal();
}
function closeModal() { document.getElementById('mo')?.remove(); }

function drawModal() {
  document.getElementById('mo')?.remove();
  const ov = document.createElement('div');
  ov.id = 'mo'; ov.className = 'm-overlay';
  ov.onclick = e => { if(e.target===ov) closeModal(); };
  ov.innerHTML = `
<div class="modal">
  <div class="m-head">
    <h3>✦ Create New Asset</h3>
    <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
  </div>
  <div class="m-body">
    <div class="field">
      <label class="field-label">Asset Name</label>
      <input class="api-input" type="text" id="mn" placeholder="My Cool Decal" value="${ms.name}" oninput="ms.name=this.value" />
    </div>
    <div class="field">
      <label class="field-label">Format</label>
      <div class="tab-row">
        <button class="tab-btn ${ms.fmt==='png'?'on':''}" onclick="ms.fmt='png';drawModal()">PNG</button>
        <button class="tab-btn ${ms.fmt==='svg'?'on':''}" onclick="ms.fmt='svg';drawModal()">SVG</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Input Method</label>
      <div class="tab-row">
        <button class="tab-btn ${ms.mode==='paste'?'on':''}" onclick="ms.mode='paste';drawModal()">📋 Paste</button>
        <button class="tab-btn ${ms.mode==='upload'?'on':''}" onclick="ms.mode='upload';drawModal()">📁 Upload File</button>
      </div>
    </div>
    <div class="field" id="cf"></div>
    ${ms.status?`<div class="m-status ${ms.stype==='err'?'ms-err':ms.stype==='ok'?'ms-ok':'ms-info'}">${ms.status}</div>`:''}
  </div>
  <div class="m-foot">
    <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary btn-sm" style="width:auto;min-width:145px;" id="dcb" onclick="doCreate()" ${ms.busy?'disabled':''}>
      ${ms.busy?'<span class="spinner"></span> Creating…':'✦ Create Asset'}
    </button>
  </div>
</div>`;
  document.body.appendChild(ov);
  drawContentField();
}

function drawContentField() {
  const f = document.getElementById('cf'); if (!f) return;
  f.innerHTML = `<label class="field-label">${ms.fmt.toUpperCase()} Content</label>`;
  if (ms.mode==='paste') {
    const ta = document.createElement('textarea');
    ta.className = 'paste-ta';
    ta.placeholder = ms.fmt==='svg'
      ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">…</svg>'
      : 'Paste base64 PNG string or data:image/png;base64,… URL';
    ta.value = ms.fmt==='svg' ? ms.svgT : ms.pngT;
    ta.oninput = e => { if(ms.fmt==='svg') ms.svgT=e.target.value; else ms.pngT=e.target.value; };
    f.appendChild(ta);
  } else {
    const accept = ms.fmt==='svg' ? '.svg,image/svg+xml' : '.png,image/png';
    const z = document.createElement('div'); z.className='up-zone';
    z.innerHTML = `<div class="up-icon">${ms.fmt==='svg'?'🖊':'🖼'}</div>
      <div>Click to upload .${ms.fmt} file</div>
      <input type="file" accept="${accept}" style="display:none" id="fi" />
      <div class="up-name" id="un">${ms.file?ms.file.name:''}</div>`;
    z.onclick = () => document.getElementById('fi')?.click();
    f.appendChild(z);
    setTimeout(()=>{
      const fi=document.getElementById('fi');
      if(fi) fi.onchange=e=>{ ms.file=e.target.files[0]||null; const u=document.getElementById('un'); if(u&&ms.file)u.textContent=ms.file.name; };
    },0);
  }
}

async function doCreate() {
  ms.name = (document.getElementById('mn')?.value||'').trim();
  if (!ms.name) { ms.status='⚠ Enter an asset name.'; ms.stype='err'; drawModal(); return; }

  let blob, mime;
  if (ms.mode==='paste') {
    const raw = (ms.fmt==='svg'?ms.svgT:ms.pngT).trim();
    if (!raw) { ms.status='⚠ Paste some content.'; ms.stype='err'; drawModal(); return; }
    if (ms.fmt==='svg') {
      mime='image/svg+xml'; blob=new Blob([raw],{type:mime});
    } else {
      try {
        let b64=raw.includes(',')?raw.split(',')[1]:raw;
        const bstr=atob(b64), arr=new Uint8Array(bstr.length);
        for(let i=0;i<bstr.length;i++) arr[i]=bstr.charCodeAt(i);
        mime='image/png'; blob=new Blob([arr],{type:mime});
      } catch { ms.status='✗ Invalid PNG base64.'; ms.stype='err'; drawModal(); return; }
    }
  } else {
    if (!ms.file) { ms.status='⚠ Upload a file first.'; ms.stype='err'; drawModal(); return; }
    mime=ms.file.type||(ms.fmt==='svg'?'image/svg+xml':'image/png');
    blob=ms.file;
  }

  let previewDataUrl=null;
  try {
    previewDataUrl = await new Promise((res,rej)=>{
      const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(blob);
    });
  } catch {}

  ms.busy=true; ms.status='⏳ Uploading to Roblox Open Cloud…'; ms.stype='info'; drawModal();

  try {
    const form=new FormData();
    form.append('request', new Blob([JSON.stringify({
      assetType:'Decal', displayName:ms.name, description:'Created via Asset Forge',
      creationContext:{creator:{}}
    })],{type:'application/json'}));
    form.append('fileContent', blob, `asset.${ms.fmt}`);

    // Don't set Content-Type — browser sets multipart boundary automatically
    const r = await fetch(PROXY, {
      method:'POST',
      headers:{ 'x-api-key':apiKey, 'x-roblox-path':'/assets/v1/assets', 'x-roblox-method':'POST' },
      body:form
    });

    let data; try { data=await r.json(); } catch { data={}; }

    if (r.ok) {
      const id=String(data.assetId||data.operationId||data.id||Date.now());
      const na={id, name:ms.name, assetType:'Decal', previewDataUrl, createdByUs:true, created:Date.now()};
      localAssets.unshift(na); saveLocal(localAssets);
      ms.busy=false; ms.status=`✓ Asset created! ID: ${id}`; ms.stype='ok'; drawModal();
      renderGrid();
      setTimeout(closeModal, 2000);
    } else {
      const msg=data.message||data.error||data.errors?.[0]?.message||JSON.stringify(data);
      ms.busy=false; ms.status=`✗ Roblox error (${r.status}): ${msg}`; ms.stype='err'; drawModal();
    }
  } catch(e) {
    ms.busy=false; ms.status=`✗ Network error: ${e.message}`; ms.stype='err'; drawModal();
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
(async()=>{
  const saved=getSaved();
  if (saved) {
    document.getElementById('root').innerHTML=`
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;">
        <div class="spinner" style="width:38px;height:38px;border-width:3px;border-top-color:var(--accent)"></div>
        <div style="font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;font-size:0.78rem;">VALIDATING SAVED KEY…</div>
      </div>`;
    const r=await validateKey(saved);
    if (r.ok) { apiKey=saved; screen2(); } else { clearSaved(); screen1(); }
  } else { screen1(); }
})();
</script>
